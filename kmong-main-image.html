<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>YTFINDER — Kmong Main Image</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2a2a2a;
    min-height: 100vh;
    font-family: -apple-system, "Pretendard", "Noto Sans KR", sans-serif;
  }
  .card {
    width: 652px;
    height: 488px;
    background:
      radial-gradient(circle at 85% 15%, rgba(0,229,160,0.18) 0%, transparent 45%),
      radial-gradient(circle at 10% 90%, rgba(168,139,250,0.12) 0%, transparent 50%),
      linear-gradient(135deg, #0a0a0f 0%, #141420 100%);
    position: relative;
    overflow: hidden;
    padding: 44px 50px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: #fff;
  }
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .top {
    position: relative;
    z-index: 2;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 13px;
    border: 1px solid rgba(0,229,160,0.4);
    background: rgba(0,229,160,0.1);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    color: #00e5a0;
    letter-spacing: 0.4px;
    margin-bottom: 18px;
  }
  .badge .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #00e5a0;
    box-shadow: 0 0 10px #00e5a0;
  }
  h1 {
    font-size: 38px;
    font-weight: 900;
    line-height: 1.22;
    letter-spacing: -1.1px;
    margin-bottom: 14px;
  }
  .gradient {
    background: linear-gradient(135deg, #00e5a0 0%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 15px;
    color: #d4d4d8;
    line-height: 1.55;
    margin-bottom: 22px;
    font-weight: 500;
  }
  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 12.5px;
    padding: 6px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    color: #e4e4e7;
    font-weight: 600;
  }
  .tag.primary {
    background: rgba(0,229,160,0.16);
    border-color: rgba(0,229,160,0.4);
    color: #6ee7d4;
  }
  .bottom {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .brand {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .logo {
    font-size: 29px;
    font-weight: 900;
    letter-spacing: 1.7px;
  }
  .brand-sub {
    font-size: 12px;
    color: #a1a1aa;
    letter-spacing: 0.5px;
    font-weight: 500;
  }
  .score-card {
    background: rgba(24,24,32,0.92);
    border: 1px solid rgba(0,229,160,0.35);
    border-radius: 15px;
    padding: 14px 20px;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 1px rgba(0,229,160,0.12);
  }
  .score-label {
    font-size: 11px;
    color: #a1a1aa;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .score-value {
    font-size: 32px;
    font-weight: 900;
    color: #00e5a0;
    line-height: 1;
  }
  .score-desc {
    font-size: 11px;
    color: #d4d4d8;
    margin-top: 5px;
    font-weight: 500;
  }
  .lifetime {
    position: absolute;
    top: 26px;
    right: 26px;
    z-index: 3;
    background: linear-gradient(135deg, #00e5a0, #06b6d4);
    color: #0a0a0f;
    font-size: 12px;
    font-weight: 900;
    padding: 8px 16px;
    border-radius: 999px;
    letter-spacing: 0.5px;
    box-shadow: 0 6px 16px rgba(0,229,160,0.4);
  }
</style>
</head>
<body>
  <div class="card">
    <div class="grid-bg"></div>
    <div class="lifetime">평생 이용권</div>

    <div class="top">
      <div class="badge"><span class="dot"></span>쇼츠 채널 분석 플랫폼</div>
      <h1>
        숨겨진 <span class="gradient">쇼츠 꿀통 채널</span>을<br>
        가장 먼저 발견하세요
      </h1>
      <p class="subtitle">
        꿀통 지수 · 떡상 지수 · 월 예상 수익까지<br>
        한눈에 확인하는 데이터 기반 채널 탐색 도구
      </p>
      <div class="tags">
        <span class="tag primary">🍯 꿀통 지수</span>
        <span class="tag primary">📈 떡상 지수</span>
        <span class="tag">💰 월 예상 수익</span>
        <span class="tag">🔍 채널 벤치마킹</span>
      </div>
    </div>

    <div class="bottom">
      <div class="brand">
        <div class="logo">YTFINDER</div>
        <div class="brand-sub">YouTube Shorts Channel Analytics</div>
      </div>
      <div class="score-card">
        <div class="score-label">Honey Score</div>
        <div class="score-value">94.7</div>
        <div class="score-desc">S급 꿀통 채널 발굴</div>
      </div>
    </div>
  </div>
</body>
</html>
